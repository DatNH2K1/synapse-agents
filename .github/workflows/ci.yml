name: CI Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - "**"

jobs:
  lint-and-check-portal:
    name: Lint & Check Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synapse-portal
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: synapse-portal/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint, Types & Other Checks
        run: npm run check

  test-portal:
    name: Test Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synapse-portal
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: synapse-portal/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Silent Tests
        run: npm run test:silent

  check-and-test-mcp:
    name: Check & Test MCP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: synapse-mcp/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r synapse-mcp/requirements.txt
          pip install pytest ruff

      - name: Run Ruff Lint Check
        run: ruff check .

      - name: Run Pytest
        run: pytest synapse-mcp
